name: Monthly Data Update

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run data pipeline
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: uv run python scripts/run_full_pipeline.py --mode incremental

      - name: Build summary
        run: uv run python scripts/build_summary.py

      - name: Commit and push processed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --staged --quiet || git commit -m "chore: monthly data update $(date +'%Y-%m')"
          git push
